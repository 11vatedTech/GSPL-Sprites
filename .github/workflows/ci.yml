name: ci
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  build-test:
    strategy:
      matrix:
        os: [windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
  studio:
    name: Studio (Windows MSVC + Qt6)
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Install Qt6
        run: choco install qt6-win64 --version 6.8.0 --no-progress -y
      - name: Configure CMake
        run: cmake -B build -S . -DGSPL_BUILD_STUDIO=ON
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
  core-only-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: Configure (CORE_ONLY)
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DGSPL_CORE_ONLY=ON
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
